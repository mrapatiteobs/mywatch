<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Comparison Slider</title>
    <style>
        /* Your provided CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        
        .comparison-container { 
            position: relative; 
            max-width: 900px; 
            margin: 0 auto; 
            overflow: hidden; 
            border-radius: 8px; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); 
            /* Added a default aspect ratio for safety */
            aspect-ratio: 16/9;
        }
        
        .comparison-images { position: relative; width: 100%; height: 100%; user-select: none; }
        
        .before-image, .after-image { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }
        
        /* The "After" image is on top and gets clipped */
        .after-image { clip-path: inset(0 0 0 50%); } 
        
        .comparison-slider { 
            position: absolute; 
            top: 0; 
            left: 50%; 
            width: 4px; 
            height: 100%; 
            background: #a855f7; 
            cursor: ew-resize; 
            z-index: 10; 
            transform: translateX(-50%); 
        }
        
        .slider-handle { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            width: 48px; 
            height: 48px; 
            background: #a855f7; 
            border: 4px solid white; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            cursor: grab; 
            box-shadow: 0 2px 12px rgba(168, 85, 247, 0.4); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 20px; 
            font-weight: bold; 
        }
        
        .slider-handle:active { cursor: grabbing; }
        .slider-handle::before { content: '⇄'; }
        
        .image-label { 
            position: absolute; 
            top: 20px; 
            padding: 8px 16px; 
            background: rgba(0, 0, 0, 0.7); 
            color: white; 
            font-size: 12px; 
            font-weight: 600; 
            border-radius: 6px; 
            z-index: 5; 
        }
        .before-label { left: 20px; }
        .after-label { right: 20px; }
    </style>
</head>
<body>

    <div class="comparison-container" id="slider-container">
        <div class="comparison-images">
            <!-- Replace 'src' with your actual image paths or base64 strings -->
            <img class="before-image" src="1.png" alt="Before">
            <img class="after-image" id="after-img" src="2.png" alt="After">
            
            <div class="image-label before-label">BEFORE1</div>
            <div class="image-label after-label">AFTER</div>
            
            <div class="comparison-slider" id="slider-bar">
                <div class="slider-handle"></div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('slider-container');
        const slider = document.getElementById('slider-bar');
        const afterImage = document.getElementById('after-img');

        function moveSlider(e) {
            const rect = container.getBoundingClientRect();
            // Calculate mouse/touch position as a percentage of the container width
            let x = (e.pageX || e.touches[0].pageX) - rect.left;
            
            if (x < 0) x = 0;
            if (x > rect.width) x = rect.width;
            
            const position = (x / rect.width) * 100;

            // Move the purple bar
            slider.style.left = position + '%';
            // Update the clip-path of the top image
            // "inset(0 0 0 50%)" means show everything from 50% to the right
            afterImage.style.clipPath = `inset(0 0 0 ${position}%)`;
        }

        // Mouse Events
        container.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) moveSlider(e); // Only move if clicking
        });
        container.addEventListener('mousedown', moveSlider);

        // Touch Events (Mobile)
        container.addEventListener('touchmove', moveSlider);
    </script>

</body>
</html>
